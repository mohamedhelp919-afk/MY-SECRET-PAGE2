<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص لـ SHIMAA 💖</title>
    <style>
        :root { --accent: #ff2e63; --glow: #00d1ff; --bg: #fff0f5; } 
        
        body { 
            background-color: var(--bg); 
            color: #444; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        /* القلوب المتساقطة */
        .heart { position: fixed; color: var(--accent); font-size: 15px; pointer-events: none; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* شاشة البداية */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,192,203,0.3), rgba(255,192,203,0.3)), url('images.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; text-align: center; padding: 20px; transition: 0.8s;
        }
        .welcome-btn { background: var(--accent); color: white; border: none; padding: 15px 45px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px var(--accent); }

        /* حاوية المحتوى */
        .container { display: none; flex-direction: column; align-items: center; width: 100%; z-index: 10; padding-bottom: 80px; position: relative; }
        
        .main-card { 
            width: 90%; max-width: 400px; 
            background: rgba(255, 255, 255, 0.25); 
            border: 1px solid rgba(255, 46, 99, 0.15); 
            border-radius: 35px; padding: 20px; 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            text-align: center; margin: 15px 0; 
            box-shadow: 0 8px 32px rgba(255, 46, 99, 0.05);
        }

        /* العداد */
        .timer-container { display: flex; justify-content: space-around; margin: 20px 0; }
        .timer-box { background: rgba(255, 255, 255, 0.5); padding: 10px; border-radius: 15px; width: 65px; border: 1px solid var(--accent); }
        .timer-box span { display: block; font-size: 20px; font-weight: bold; color: var(--accent); }

        /* الكروت الأربعة */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .gift-card { 
            background: rgba(255, 255, 255, 0.6); 
            border-radius: 15px; border: 1px solid var(--accent); 
            height: 75px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; overflow: hidden; 
            font-weight: bold; color: var(--accent);
        }
        .msg-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: var(--accent); color: white; 
            display: none; align-items: center; justify-content: center; 
            font-size: 13px; padding: 5px;
